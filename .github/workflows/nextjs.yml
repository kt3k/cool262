name: Deploy Next.js site to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build all sites
        run: pnpm build:all
      - name: Setup Deno
        # Needed only for the Lume PoC build below.
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Build Lume PoC
        # Outputs to lume-poc/_site/; gets folded into dist/lume-poc/ by
        # assemble-dist.mjs. BASE_PATH lets the layout's stylesheet href
        # and Pagefind bundlePath resolve under the gh-pages prefix.
        working-directory: lume-poc
        env:
          BASE_PATH: /ecma262/lume-poc
        run: deno task build && deno task pagefind
      - name: Assemble combined dist/
        # Copies each site's out/ into dist/<id>/, plus lume-poc/_site/ into
        # dist/lume-poc/, and writes the landing page.
        run: pnpm assemble
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
